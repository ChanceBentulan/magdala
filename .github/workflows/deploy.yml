name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd magdala

            # Pull latest code
            git pull origin main

            # Build Docker image
            docker compose build app

            # Run migrations
            docker compose run --rm app sh -c "DATABASE_URL=\"$DATABASE_URL\" npx drizzle-kit migrate"

            # Restart app with new image
            docker compose up -d app

            # Clean up old images
            docker image prune -f
